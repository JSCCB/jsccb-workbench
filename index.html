<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a4ea3" />
  <title>JSCCB · 员工工作台</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icons/icon.svg" />
  <link rel="stylesheet" href="assets/css/style.css?v=2" />
</head>
<body>
  <!-- 登录：工号作为登录凭证 -->
  <div id="login" class="lock-screen">
    <div class="lock-card">
      <div class="brand"><span class="logo">JSCCB</span><span class="brand-sub">银行员工工作台</span></div>
      <h1>员工登录</h1>
      <p class="lock-tip">请输入 HR 分配的工号</p>
      <form id="login-form" autocomplete="off">
        <input id="emp-input" type="text" placeholder="工号，如 JSCCB0001" />
        <button type="submit" class="btn-primary">登 录</button>
      </form>
      <p id="login-error" class="error-text"></p>
      <p class="hint" style="margin-top:12px;font-size:11px;color:#888;">工号需先在HR系统创建</p>
    </div>
  </div>

  <!-- 主体 -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="topbar-left">
        <span class="logo">JSCCB</span>
        <span class="topbar-title">员工工作台</span>
      </div>
      <div class="topbar-right">
        <span id="who" class="who"></span>
        <button id="logout-btn" class="btn-ghost">退出</button>
      </div>
    </header>

    <main class="container">
      <!-- 模块宫格 -->
      <section id="home" class="view">
        <h2 class="sec-title">业务模块</h2>
        <div id="module-grid" class="module-grid"></div>
        <p class="hint">工号由 HR 管理系统（jsccb-hr）创建。三者部署到同一 GitHub Pages 域名后共享 localStorage，工号即为本工作台登录凭证。</p>
      </section>

      <!-- 动态模块容器 -->
      <section id="module-view" class="view hidden"></section>
    </main>
  </div>

  <script src="assets/js/app.js?v=2"></script>
</body>
</html>
