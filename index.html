<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a4ea3" />
  <title>JSCCB</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/images/icon-192.png" />
  <link rel="stylesheet" href="assets/css/style.css?v=7" />
</head>
<body>
  <!-- 鐧诲綍 -->
  <div id="login" class="lock-screen">

      <h1>鍛樺伐鐧诲綍</h1>

  <!-- 涓讳綋 -->

      </div>
      <div class="topbar-right">
        <span id="who" class="who"></span>

    </header>

    <main class="container">
      <!-- 涓氬姟 Tab -->

          <h2 class="sec-title">涓氬姟妯″潡</h2>

        </section>
        <section id="module-view" class="view hidden"></section>
      </section>

      <!-- 鎴戠殑 Tab -->
      <section id="tab-profile" class="tab-content hidden">
        <div class="profile-header">
          <div class="profile-avatar">
            <div class="avatar-circle" id="profile-avatar">馃懁</div>
          </div>
          <div class="profile-info">
            <h2 class="profile-name" id="profile-name">--</h2>
            <p class="profile-id">宸ュ彿锛?span id="profile-id">--</span></p>
            <div class="profile-tags">

              <span class="tag" id="profile-position">--</span>
              <span class="tag tag-status" id="profile-status">鍦ㄨ亴</span>
            </div>
          </div>
        </div>
        
        <div class="profile-section">
          <h3 class="section-title">鍩烘湰淇℃伅</h3>
          <div class="info-list">
            <div class="info-item"><span class="info-label">鍏ヨ亴鏃ユ湡</span><span class="info-value" id="profile-join">--</span></div>
            <div class="info-item"><span class="info-label">鑱旂郴鏂瑰紡</span><span class="info-value" id="profile-phone">--</span></div>
            <div class="info-item"><span class="info-label">閭</span><span class="info-value" id="profile-email">--</span></div>
          </div>
        </div>

        <div class="profile-section">
          <h3 class="section-title">宸ヤ綔缁熻</h3>
          <div class="stats-grid">
            <div class="stat-item"><div class="stat-num" id="stat-cc">0</div><div class="stat-label">淇＄敤鍗″鏍?/div></div>
            <div class="stat-item"><div class="stat-num" id="stat-loan">0</div><div class="stat-label">璐锋瀹℃牳</div></div>
            <div class="stat-item"><div class="stat-num" id="stat-pending">0</div><div class="stat-label">寰呭浠诲姟</div></div>
          </div>
        </div>
      </section>
    </main>

    <!-- 搴曢儴 Tab 瀵艰埅 -->
    <nav class="tab-nav-bottom">
      <button class="tab-btn active" data-tab="business">
        <span class="tab-icon">馃搵</span>
        <span class="tab-label">涓氬姟</span>
      </button>
      <button class="tab-btn" data-tab="profile">
        <span class="tab-icon">馃懁</span>
        <span class="tab-label">鎴戠殑</span>
      </button>
    </nav>
  </div>

  <script src="assets/js/app.js?v=7"></script>

</html>
