<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>JSCCB 银行员工工作台</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/images/icon-192.png" />
  <meta name="theme-color" content="#0a4ea3" />
  <link rel="stylesheet" href="assets/css/style.css?v=18" />
</head>
<body>
  <div id="login" class="login-screen">
    <div class="login-card">
      <div class="brand">
        <span class="logo">JSCCB</span>
        <span class="brand-sub">银行员工工作台</span>
      </div>
      <h1>员工登录</h1>
      <p class="login-tip">请输入 HR 分配的工号</p>
      <form id="login-form" autocomplete="off">
        <input id="emp-input" placeholder="例如 JSCCB0001" inputmode="text" />
        <button type="submit" class="btn-primary">登录</button>
      </form>
      <p id="login-error" class="error-text"></p>
      <p class="hint">工号需先在HR系统创建</p>
    </div>
  </div>
  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="topbar-left"><span class="logo">JSCCB</span></div>
      <div class="topbar-right"><span id="who"></span><button id="logout-btn" class="btn-ghost">退出</button></div>
    </header>
    <main class="container">
      <section id="tab-business" class="tab-content"><h2 class="section-title">业务办理</h2><div id="module-grid" class="module-grid"></div></section>
      <section id="module-view" class="module-view hidden"></section>
      <section id="tab-profile" class="tab-content hidden">
        <div class="profile-header">
          <div class="profile-avatar">
            <img class="avatar-circle" id="profile-avatar-img" src="" alt="头像" style="display:none;width:100px;height:100px;border-radius:50%;object-fit:cover;">
            <div class="avatar-circle" id="profile-avatar" style="display:flex;width:100px;height:100px;font-size:48px;">👤</div>
          </div>
        </div>
        <div class="profile-section">
          <h3 class="section-title">基本信息</h3>
          <div class="info-list">
            <div class="info-item"><span class="info-label">姓名</span><span class="info-value" id="profile-name">--</span></div>
            <div class="info-item"><span class="info-label">工号</span><span class="info-value" id="profile-id">--</span></div>
            <div class="info-item"><span class="info-label">部门</span><span class="info-value" id="profile-dept">--</span></div>
            <div class="info-item"><span class="info-label">岗位</span><span class="info-value" id="profile-position">--</span></div>
            <div class="info-item"><span class="info-label">状态</span><span class="info-value" id="profile-status">--</span></div>
            <div class="info-item"><span class="info-label">入职时间</span><span class="info-value" id="profile-join">--</span></div>
          </div>
        </div>
      </section>
    </main>
    <nav class="tab-nav-bottom">
      <button class="tab-btn active" data-tab="business"><span class="tab-icon">📋</span><span class="tab-label">业务</span></button>
      <button class="tab-btn" data-tab="profile"><span class="tab-icon">👤</span><span class="tab-label">我的</span></button>
    </nav>
  </div>
  <script src="assets/js/app.js?v=18"></script>
</body>
</html>
