<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>JSCCB 银行员工工作台</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/images/icon-192.png" />
  <meta name="theme-color" content="#0a4ea3" />
  <link rel="stylesheet" href="assets/css/style.css?v=12" />
</head>
<body>
  <div id="login" class="login-screen">
    <div class="login-card">
      <div class="brand">
        <span class="logo">JSCCB</span>
        <span class="brand-sub">银行员工工作台</span>
      </div>
      <h1>员工登录</h1>
      <p class="login-tip">请输入 HR 分配的工号</p>
      <form id="login-form" autocomplete="off">
        <input id="emp-input" placeholder="例如 JSCCB0001" inputmode="text" />
        <button type="submit" class="btn-primary">登录</button>
      </form>
      <p id="login-error" class="error-text"></p>
      <p class="hint">工号需先在HR系统创建</p>
    </div>
  </div>
  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="topbar-left"><span class="logo">JSCCB</span></div>
      <div class="topbar-right"><span id="who"></span><button id="logout-btn" class="btn-ghost">退出</button></div>
    </header>
    <main class="container">
      <section id="tab-business" class="tab-content"><h2 class="section-title">业务办理</h2><div id="module-grid" class="module-grid"></div></section>
      <section id="module-view" class="module-view hidden"></section>
      <section id="tab-profile" class="tab-content hidden">
        <div class="profile-header">
          <div class="profile-avatar">
            <img class="avatar-circle" id="profile-avatar-img" src="" alt="头像" style="display:none;width:80px;height:80px;border-radius:50%;object-fit:cover;">
            <div class="avatar-circle" id="profile-avatar" style="display:flex;">👤</div>
          </div>
          <div class="profile-info">
            <h2 class="profile-name" id="profile-name">--</h2>
            <p class="profile-id">工号：<span id="profile-id">--</span></p>
            <div class="profile-tags">
              <span class="tag" id="profile-dept">--</span>
              <span class="tag" id="profile-position">--</span>
              <span class="tag tag-status" id="profile-status">在职</span>
            </div>
          </div>
        </div>
        <div class="profile-section">
          <h3 class="section-title">基本信息</h3>
          <div class="info-list">
            <div class="info-item"><span class="info-label">入职日期</span><span class="info-value" id="profile-join">--</span></div>
            <div class="info-item"><span class="info-label">联系方式</span><span class="info-value" id="profile-phone">--</span></div>
            <div class="info-item"><span class="info-label">邮箱</span><span class="info-value" id="profile-email">--</span></div>
          </div>
        </div>
        <div class="profile-section">
          <h3 class="section-title">工作统计</h3>
          <div class="stats-grid">
            <div class="stat-item"><div class="stat-num" id="stat-cc">0</div><div class="stat-label">信用卡审核</div></div>
            <div class="stat-item"><div class="stat-num" id="stat-loan">0</div><div class="stat-label">贷款审核</div></div>
            <div class="stat-item"><div class="stat-num" id="stat-pending">0</div><div class="stat-label">待审任务</div></div>
          </div>
        </div>
      </section>
    </main>
    <nav class="tab-nav-bottom">
      <button class="tab-btn active" data-tab="business"><span class="tab-icon">📋</span><span class="tab-label">业务</span></button>
      <button class="tab-btn" data-tab="profile"><span class="tab-icon">👤</span><span class="tab-label">我的</span></button>
    </nav>
  </div>
  <script src="assets/js/app.js?v=12"></script>
</body>
</html>
